name: state_cafe
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ">=3.10.4 <4.0.0"
  flutter: ^3.38.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  rxdart: ^0.27.0
  lifecycle_aware_state: ^0.0.4
  touch_mouse_behavior: ^0.0.1
  shared_preferences: ^2.0.15
  live_event: ^0.0.2
  fluttertoast: ^8.0.9
  bloc: ^8.1.0
  flutter_bloc: ^8.1.1
  equatable: ^2.0.3
  imager: ^1.0.0
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1
  redux: ^5.0.0
  flutter_redux: ^0.10.0
  redux_thunk: ^0.4.0
  get_it: ^7.7.0
  get: ^4.6.6
  mobx: ^2.3.3+2
  flutter_mobx: ^2.2.1+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  build_runner: ^2.0.3
  mobx_codegen: ^2.6.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/coffee/
    - assets/juice/
    - assets/tea/
  fonts:
    - family: AppIcons
      fonts:
        - asset: fonts/AppIcons.ttf
